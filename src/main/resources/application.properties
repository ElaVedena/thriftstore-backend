spring.application.name=com.vedathrifts

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mariadb://mysql.railway.internal:3306/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:HMhSZmEtUYkuTKGHagXczNBUxsAGvTHk}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwtSecret=${JWT_SECRET:5c8a9f7e3d1b2a4c6e8f0d9b7a5c3e1f8d6b2a4c7e9f1d3b5a8c6e0f4d2b8a1c}
app.jwtExpirationMs=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.vedathrifts=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG

# CORS Allowed Origins
cors.allowed-origins=http://localhost:3000,https://vedathrifts.com,https://www.vedathrifts.com

# Show full error messages
server.error.include-message=always
server.error.include-binding-errors=always
logging.level.org.springframework.web=DEBUG

# File Upload Configuration
spring.servlet.multipart.enabled=true

# Where to store uploaded files
file.upload-dir=${FILE_UPLOAD_DIR:uploads/products}

# Cloudinary Configuration - with defaults
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# M-Pesa Configuration - READ FROM ENVIRONMENT VARIABLES
mpesa.consumer-key=${MPESA_CONSUMER_KEY}
mpesa.consumer-secret=${MPESA_CONSUMER_SECRET}
mpesa.passkey=${MPESA_PASSKEY}
mpesa.shortcode=${MPESA_SHORTCODE}
mpesa.callback-url=${MPESA_CALLBACK_URL}
mpesa.environment=${MPESA_ENVIRONMENT:production}
mpesa.base-url=${MPESA_BASE_URL:https://api.safaricom.co.ke}
mpesa.till-number=${MPESA_TILL_NUMBER}

# Resend Configuration
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:info@vedathrifts.com}
resend.from-name=${RESEND_FROM_NAME:VedaThrifts}

# Email Configuration 
email.from=${RESEND_FROM_EMAIL:onboarding@resend.dev}
email.from-name=${RESEND_FROM_NAME:VedaThrifts}
email.admin-email=${ADMIN_EMAIL:admin@vedathrifts.com}