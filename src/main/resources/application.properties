spring.application.name=com.vedathrifts

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# Database Configuration - Use Railway connection string
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration - Use environment variable
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.vedathrifts=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG

# CORS Allowed Origins
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Show full error messages
server.error.include-message=always
server.error.include-binding-errors=always
logging.level.org.springframework.web=DEBUG

# File Upload Configuration
spring.servlet.multipart.enabled=true

# Where to store uploaded files
file.upload-dir=${FILE_UPLOAD_DIR:uploads/products}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# M-Pesa Configuration
mpesa.consumer-key=${MPESA_CONSUMER_KEY}
mpesa.consumer-secret=${MPESA_CONSUMER_SECRET}
mpesa.passkey=${MPESA_PASSKEY}
mpesa.shortcode=${MPESA_SHORTCODE}
mpesa.callback-url=${MPESA_CALLBACK_URL}
mpesa.environment=${MPESA_ENVIRONMENT:sandbox}
mpesa.base-url=${MPESA_BASE_URL:https://sandbox.safaricom.co.ke}

# Resend Configuration
resend.api-key=${RESEND_API_KEY}
resend.from-email=${RESEND_FROM_EMAIL:onboarding@resend.dev}
resend.from-name=${RESEND_FROM_NAME:VedaThrifts}

# Email Configuration
email.from=${RESEND_FROM_EMAIL:onboarding@resend.dev}
email.from-name=${RESEND_FROM_NAME:VedaThrifts}
email.admin-email=${ADMIN_EMAIL:admin@vedathrifts.com}