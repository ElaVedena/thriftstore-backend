spring.application.name=com.vedathrifts

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration - MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/vedathrifts_db
spring.datasource.username=root
spring.datasource.password=vedyvash.1
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration - Using app.jwt prefix (to match JwtUtils.java)
app.jwtSecret=your_super_secret_jwt_key_that_should_be_at_least_32_characters_long
app.jwtExpirationMs=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.vedathrifts=DEBUG
logging.level.org.springframework.security=INFO
# Show SQL errors
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG

# CORS Allowed Origins
cors.allowed-origins=http://localhost:3000

# Show full error messages
server.error.include-message=always
server.error.include-binding-errors=always
logging.level.org.springframework.web=DEBUG

# File Upload Configuration
spring.servlet.multipart.enabled=true

# Where to store uploaded files (create this directory)
file.upload-dir=${user.dir}/uploads/products

# Cloudinary Configuration - Load from environment variables
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

